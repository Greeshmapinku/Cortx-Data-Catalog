services:
  - type: web
    name: cortx-catalog-demo
    runtime: python
    region: oregon
    plan: free
    # Only install minimal deps, SKIP the package with heavy ML deps
    buildCommand: "pip install flask flask-cors pandas pydantic python-dotenv pyarrow"
    startCommand: "python app_render.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: RENDER
        value: "true"
    healthCheckPath: /api/health
