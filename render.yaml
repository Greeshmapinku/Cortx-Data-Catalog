services:
  - type: web
    name: cortx-catalog-demo
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements-render.txt"
    startCommand: "python app.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: RENDER
        value: "true"
    healthCheckPath: /api/health
